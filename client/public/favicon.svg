<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseGradient" x1="30" y1="30" x2="190" y2="190">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle
    cx="110"
    cy="110"
    r="95"
    fill="#0F172A"
    stroke="url(#pulseGradient)"
    stroke-width="6"
  />

  <!-- Analytics Bars -->
  <rect x="60" y="125" width="14" height="35" rx="4" fill="#38BDF8"/>
  <rect x="85" y="105" width="14" height="55" rx="4" fill="#3B82F6"/>
  <rect x="110" y="80" width="14" height="80" rx="4" fill="#2563EB"/>
  <rect x="135" y="95" width="14" height="65" rx="4" fill="#38BDF8"/>

  <!-- Pulse Line -->
  <path
    d="M45 95
       L70 95
       L84 78
       L98 118
       L114 62
       L128 108
       L143 90
       L175 90"
    stroke="#22D3EE"
